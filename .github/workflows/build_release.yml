name: Build and Release Multi-Platform

on:
  # 1. AUTO RELEASE TRIGGER (from auto_tag.yml)
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  # 2. MANUAL TRIGGER (with tag push)
  push:
    tags:
      - 'v*'
  # 3. MANUAL TRIGGER (workflow_dispatch)
  workflow_dispatch:

permissions:
  contents: write

env:
  IS_RELEASE: ${{ inputs.tag_name != '' || startsWith(github.ref, 'refs/tags/v') }}
  TAG_NAME: ${{ inputs.tag_name || github.ref_name }}

jobs:
  # ==================================================================================
  # 1. WINDOWS BUILD (x64)
  # ==================================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      # ── Python backend binary ──────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python Dependencies
        run: uv export --no-hashes -o requirements.txt && pip install -r requirements.txt

      - name: Build Python Backend (Windows x64) 🐍
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: backend.py
          mode: standalone
          windows-console-mode: disable
          include-package: UnityPy.resources
          include-package-data: |
            UnityPy
            archspec
          output-dir: dist_backend
          output-file: abvme-server.exe

      - name: Stage sidecar binary (Windows) 📦
        shell: powershell
        run: |
          $distDir = Get-ChildItem -Path "dist_backend" -Filter "*.dist" | Select-Object -First 1
          $target = "x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path "src-tauri\binaries"
          # Copy the entire dist folder contents to a temp dir, then zip later with Tauri
          Copy-Item "$($distDir.FullName)\*" "src-tauri\binaries\abvme-server-$target" -Recurse -Force
          # Tauri expects a single executable for externalBin; rename the .exe
          Move-Item "src-tauri\binaries\abvme-server-$target\abvme-server.exe" `
                    "src-tauri\binaries\abvme-server-$target.exe"

      # ── Node / Tauri frontend ──────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri App (Windows) 🏗️
        run: npm run tauri build -- --bundles nsis,msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload Windows Installers 📤
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Testing)
        if: ${{ env.IS_RELEASE != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ABVME-Windows-x64-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ==================================================================================
  # 2. LINUX BUILD (x64 & arm64)
  # ==================================================================================
  build-linux:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
          - arch: aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            tauri_target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      # ── System dependencies ────────────────────────────────────────────────────
      - name: Install System Dependencies (Linux) 🐧
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf libfuse2 \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev libssl-dev \
            libayatana-appindicator3-dev

      # ── Python backend binary ──────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python Dependencies
        run: uv export --no-hashes -o requirements.txt && pip install -r requirements.txt

      - name: Build Python Backend (Linux) 🐍
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: backend.py
          mode: standalone
          include-package: UnityPy.resources
          include-package-data: |
            UnityPy
            archspec
          output-dir: dist_backend
          output-file: abvme-server

      - name: Stage sidecar binary (Linux) 📦
        run: |
          distDir=$(find dist_backend -maxdepth 1 -name "*.dist" -type d | head -1)
          mkdir -p src-tauri/binaries
          # Copy entire dist as support files directory
          cp -r "$distDir" "src-tauri/binaries/abvme-server-${{ matrix.rust_target }}-support"
          # Move the main executable to the expected sidecar path
          mv "src-tauri/binaries/abvme-server-${{ matrix.rust_target }}-support/abvme-server" \
             "src-tauri/binaries/abvme-server-${{ matrix.rust_target }}"
          chmod +x "src-tauri/binaries/abvme-server-${{ matrix.rust_target }}"

      # ── Node / Tauri frontend ──────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri App (Linux) 🏗️
        run: npm run tauri build -- --bundles deb,appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload Linux Packages 📤
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Testing)
        if: ${{ env.IS_RELEASE != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ABVME-Linux-${{ matrix.arch }}-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
